services:
  db:
    image: postgres:16-alpine
    container_name: school_db_container
    environment:
      # Usage: ${VAR_NAME:-DEFAULT_VALUE}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pass123}
      POSTGRES_DB: ${DB_NAME:-school_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-school_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: